plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.ultimateroadrunner.game'

    defaultConfig {
        applicationId "com.ultimateroadrunner.game"
        minSdk 21
        targetSdk 34
        versionCode 11
        versionName "2.0"
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias System.getenv("KEY_ALIAS") ?: ""
            keyPassword System.getenv("KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    packagingOptions {
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
    
    // Appodeal Modular Integration
    // Corrected module names: bigo_ads instead of bigoads
    implementation 'com.appodeal.ads:sdk:3.3.1.0'
    implementation 'com.appodeal.ads.sdk.networks:applovin:3.3.1.0'
    implementation 'com.appodeal.ads.sdk.networks:bidmachine:3.3.1.0'
    implementation 'com.appodeal.ads.sdk.networks:bigo_ads:3.3.1.0'
    implementation 'com.appodeal.ads.sdk.networks:mintegral:3.3.1.0'
    implementation 'com.appodeal.ads.sdk.networks:vungle:3.3.1.0'
    
    // Explicitly exclude AdMob and Yandex from the core SDK to be safe
    configurations.all {
        exclude group: 'com.appodeal.ads.sdk.networks', module: 'admob'
        exclude group: 'com.appodeal.ads.sdk.networks', module: 'yandex'
        exclude group: 'com.google.android.gms', module: 'play-services-ads'
    }
}
