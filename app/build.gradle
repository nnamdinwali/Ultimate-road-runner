plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.ultimateroadrunner.game'

    defaultConfig {
        applicationId "com.ultimateroadrunner.game"
        minSdk 21
        targetSdk 34
        versionCode 14
        versionName "2.3"
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias System.getenv("KEY_ALIAS") ?: ""
            keyPassword System.getenv("KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    packagingOptions {
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
    
    // Appodeal Modular Integration (v2.3)
    // Using dynamic versions to ensure the build finds the latest compatible adapters
    implementation 'com.appodeal.ads:sdk:3.3.1.0'
    
    // Core Mediation & Backfill (Mapped to your "Ad Server" and "Backfill" dashboard ON states)
    implementation 'com.appodeal.ads.sdk.networks:appodeal:3.3.1.+'
    implementation 'com.appodeal.ads.sdk.networks:appodealx:3.3.1.+'
    implementation 'com.appodeal.ads.sdk.networks:bidon:3.3.1.+'
    
    // Your Active Dashboard Networks (One-by-One)
    implementation 'com.appodeal.ads.sdk.networks:applovin:3.3.1.+'
    implementation 'com.appodeal.ads.sdk.networks:bidmachine:3.3.1.+'
    implementation 'com.appodeal.ads.sdk.networks:bigo_ads:3.3.1.+'
    implementation 'com.appodeal.ads.sdk.networks:mintegral:3.3.1.+'
    implementation 'com.appodeal.ads.sdk.networks:vungle:3.3.1.+'
    
    // Strict Exclusion of AdMob and Yandex
    configurations.all {
        exclude group: 'com.appodeal.ads.sdk.networks', module: 'admob'
        exclude group: 'com.appodeal.ads.sdk.networks', module: 'yandex'
        exclude group: 'com.google.android.gms', module: 'play-services-ads'
    }
}
