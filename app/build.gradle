plugins {
      id 'com.android.application'
    }

    // Exclude only the AdMob / Yandex mediation ADAPTERS (these need their own
    // network accounts + extra setup). Do NOT exclude the underlying Google
    // Play Services ads/measurement libraries below this line — Appodeal's own
    // CMP (consent screen) depends on those, and excluding them silently
    // breaks the CMP popup even though AdMob/Yandex themselves stay disabled.
    configurations.all {
      exclude group: 'com.appodeal.ads.sdk.networks', module: 'admob'
      exclude group: 'com.appodeal.ads.sdk.networks', module: 'yandex'
    }

    android {
      compileSdk 34
      namespace 'com.roadrunner.game'

      defaultConfig {
          applicationId "com.roadrunner.game"
          minSdk 21
          targetSdk 34
          versionCode 16
          versionName "2.5"
      }

      signingConfigs {
          release {
              storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")
              storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
              keyAlias System.getenv("KEY_ALIAS") ?: ""
              keyPassword System.getenv("KEY_PASSWORD") ?: ""
          }
      }

      buildTypes {
          release {
              minifyEnabled false
              shrinkResources false
              signingConfig signingConfigs.release
          }
          debug {
              applicationIdSuffix ".debug"
          }
      }

      compileOptions {
          sourceCompatibility JavaVersion.VERSION_11
          targetCompatibility JavaVersion.VERSION_11
      }

      packagingOptions {
          exclude 'META-INF/LICENSE'
          exclude 'META-INF/LICENSE.txt'
      }
    }

    dependencies {
      implementation 'androidx.appcompat:appcompat:1.6.1'
      implementation 'androidx.webkit:webkit:1.9.0'

      // Appodeal Full SDK - AdMob/Yandex adapters excluded via configurations.all above AND inline below.
      // The full SDK provides all core classes (Appodeal, callbacks, etc.)
      // Do NOT add individual network adapters separately - they are already inside the
      // full SDK bundle. Adding them again causes duplicate class conflicts and crashes.
      // NOTE: Google Play Services ads/measurement libs are intentionally NOT excluded here -
      // Appodeal's CMP (consent screen) needs them even with AdMob/Yandex adapters excluded.
      implementation('com.appodeal.ads:sdk:3.3.1.0') {
          exclude group: 'com.appodeal.ads.sdk.networks', module: 'admob'
          exclude group: 'com.appodeal.ads.sdk.networks', module: 'yandex'
      }
    }
    