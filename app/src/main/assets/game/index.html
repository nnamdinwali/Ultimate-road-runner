    <script type="text/javascript">

        /* ── Helper stubs used by game events ─────────────────────────────── */
        window.gmOnDeath = function(runtimeScene) {
            window._gmRuntimeScene = runtimeScene;
            try { window._gmSavedVolume = gdjs.evtTools.sound.getGlobalVolume(runtimeScene); } catch(e) { window._gmSavedVolume = 100; }
        };
        window.gmShowReviveButton = function(runtimeScene) {
            window._gmRuntimeScene = runtimeScene;
            try { window._gmSavedVolume = gdjs.evtTools.sound.getGlobalVolume(runtimeScene); } catch(e) { window._gmSavedVolume = 100; }
        };
        window.gmHideReviveButton = function() {};

        /* ── bridge stub — no ads active ──────────────────────────────────── */
        var _adEmitter = (function() {
            var listeners = {};
            return {
                on:   function(event, cb)  { if (!listeners[event]) listeners[event] = []; listeners[event].push(cb); },
                emit: function(event, val) { (listeners[event] || []).forEach(function(cb) { cb(val); }); }
            };
        })();

        window.bridge = {
            advertisement: {
                isInterstitialSupported: false,
                isBannerSupported:       false,
                isRewardedSupported:     false,
                on: function(event, cb) { _adEmitter.on(event, cb); },
                setMinimumDelayBetweenInterstitial: function() {},
                showInterstitial: function() {},
                showBanner:       function() {},
                hideBanner:       function() {},
                showRewarded:     function() {}
            },
            storage: {
                get: function(keys) {
                    return Promise.resolve(keys.map(function(k) { return localStorage.getItem(String(k)); }));
                },
                set: function(keys, values) {
                    keys.forEach(function(k, i) {
                        localStorage.setItem(String(k), typeof values[i] === 'string' ? values[i] : JSON.stringify(values[i]));
                    });
                    return Promise.resolve();
                }
            },
            platform: { on: function() {}, sendMessage: function() {} },
            EVENT_NAME: {
                PAUSE_STATE_CHANGED:        'pause_state_changed',
                AUDIO_STATE_CHANGED:        'audio_state_changed',
                INTERSTITIAL_STATE_CHANGED: 'interstitial_state_changed',
                BANNER_STATE_CHANGED:       'banner_state_changed',
                REWARDED_STATE_CHANGED:     'rewarded_state_changed'
            }
        };

        /* ── Save/load progress ────────────────────────────────────────────── */
        window._pgSaveProgress = function() {
            try {
                var stack = window._gmGame && window._gmGame._sceneStack && window._gmGame._sceneStack._stack;
                if (!stack || !stack.length) return;
                var vars = stack[0].getVariables();
                var owning = {
                    Chicken: vars.get('OwningCharacters').getChild('Chicken').getAsBoolean(),
                    Cat:     vars.get('OwningCharacters').getChild('Cat').getAsBoolean(),
                    Dog:     vars.get('OwningCharacters').getChild('Dog').getAsBoolean()
                };
                bridge.storage.set(
                    ['CoinsCount','Highscore','SelectedCharacter','OwningCharacters','Volume'],
                    [String(vars.get('CoinsCount').getAsNumber()), String(vars.get('Highscore').getAsNumber()),
                     vars.get('SelectedCharacterName').getAsString(), JSON.stringify(owning),
                     String(vars.get('Volume').getAsNumber())]
                );
            } catch(e) {}
        };

        /* ── Android → JS reward callback (called by MainActivity after rewarded ad) ── */
        // _runEarnedCoins: coins collected this run, set by _startAdTimers at death.
        window._runEarnedCoins = 0;
        window.onRewardedAdComplete = function() {
            try {
                // Only reward if the player earned at least 1 coin this run.
                // (Button should already be hidden for 0-coin runs, but guard here too.)
                if (window._runEarnedCoins <= 0) {
                    window._hideWatchAdBtn && window._hideWatchAdBtn();
                    return;
                }
                var stack = window._gmGame && window._gmGame._sceneStack && window._gmGame._sceneStack._stack;
                if (!stack || !stack.length) return;
                var scene = stack[0];
                var vars = scene.getVariables();
                var newTotal = vars.get('CoinsCount').getAsNumber() + 1; // always +1
                vars.get('CoinsCount').setNumber(newTotal);
                // Save to GDevelop JSON storage — the same system replaceScene reloads from,
                // so the +1 coin persists when the player hits Retry.
                try { gdjs.evtTools.storage.writeNumberInJSONFile('Save', 'Coins', newTotal); } catch(e2) {}
                window._pgSaveProgress && window._pgSaveProgress();
            } catch(e) {}
            window._hideWatchAdBtn && window._hideWatchAdBtn();
        };

        /* ── On-death hook — save progress + show interstitial ad ───────────── */
        window._startAdTimers = function() {
            var _origOnDeath = window.gmOnDeath;
            var _lastInterstitialTime = 0;
            var INTERSTITIAL_COOLDOWN_MS = 60000; // max once per 60s

            // Tracks how many coins were collected in the current run.
            var _runStartCoins = 0;
            var _wasInGameplay  = false; // were we in active gameplay last tick?

            window.gmOnDeath = function(runtimeScene) {
                _origOnDeath && _origOnDeath(runtimeScene);
                window._pgSaveProgress && window._pgSaveProgress();

                // Compute coins earned this run = total now minus total at run start
                try {
                    var coinsNow = runtimeScene.getScene().getVariables().getFromIndex(0).getAsNumber();
                    window._runEarnedCoins = Math.max(0, coinsNow - _runStartCoins);
                } catch(e) { window._runEarnedCoins = 0; }

                // Show interstitial on death (with cooldown so it's not every single death)
                var now = Date.now();
                if (now - _lastInterstitialTime >= INTERSTITIAL_COOLDOWN_MS) {
                    if (window.AndroidBridge && typeof window.AndroidBridge.showInterstitialAd === 'function') {
                        _lastInterstitialTime = now;
                        setTimeout(function() {
                            window.AndroidBridge.showInterstitialAd();
                        }, 600); // slight delay so game-over screen appears first
                    }
                }

                // Only show Watch-Ad button if the player earned at least 1 coin this run.
                // Zero coins earned = nothing to double = button stays hidden.
                if (window._runEarnedCoins > 0) {
                    window._showWatchAdBtn && window._showWatchAdBtn();
                }
            };

            // Poll every 200ms for two jobs:
            //   1. Hide Watch-Ad button when Game Over layer disappears (Retry tapped)
            //   2. Show banner ONLY during active gameplay; hide on Menu/Game Over/Shop/Settings
            var _bannerShown = false;
            var _seenMenu = false; // banner only allowed after Menu was seen once (game fully loaded)
            var UI_LAYERS = ["Menu", "Game Over", "Shop", "Settings"];
            setInterval(function() {
                try {
                    var stack = window._gmGame && window._gmGame._sceneStack && window._gmGame._sceneStack._stack;
                    if (!stack || !stack.length) return;
                    var scene = stack[0];

                    // 1. Watch-Ad button: hide once Game Over layer is gone
                    try {
                        var goLayer = scene.getLayer("Game Over");
                        if (goLayer && !goLayer.isVisible()) {
                            window._hideWatchAdBtn && window._hideWatchAdBtn();
                        }
                    } catch(e2) {}

                    // 2. Banner: hide on any UI screen, show during active gameplay only
                    var anyUI = false;
                    try { var _ml = scene.getLayer("Menu"); if (_ml && _ml.isVisible()) _seenMenu = true; } catch(_me) {}
                    for (var i = 0; i < UI_LAYERS.length; i++) {
                        try {
                            var l = scene.getLayer(UI_LAYERS[i]);
                            if (l && l.isVisible()) { anyUI = true; break; }
                        } catch(e3) {}
                    }
                    if (anyUI && _bannerShown) {
                        _bannerShown = false;
                        if (window.AndroidBridge && typeof window.AndroidBridge.hideBanner === 'function') {
                            window.AndroidBridge.hideBanner();
                        }
                    } else if (!anyUI && !_bannerShown && _seenMenu) {
                        _bannerShown = true;
                        if (window.AndroidBridge && typeof window.AndroidBridge.showBanner === 'function') {
                            window.AndroidBridge.showBanner();
                        }
                    }

                    // 3. Detect moment active gameplay begins (no UI visible after menu seen once).
                    //    Snapshot coin total as the run baseline so we know what was earned this run.
                    var inGameplay = !anyUI && _seenMenu;
                    if (inGameplay && !_wasInGameplay) {
                        try {
                            _runStartCoins = scene.getScene().getVariables().getFromIndex(0).getAsNumber();
                            window._runEarnedCoins = 0; // reset for fresh run
                        } catch(e4) {}
                    }
                    _wasInGameplay = inGameplay;
                } catch(e) {}
            }, 200);
        };

        /* ── Rewarded ad trigger — called from GDevelop "watch ad" button ──── */
        window.showRewardedAd = function() {
            if (window.AndroidBridge && typeof window.AndroidBridge.showRewardedAd === 'function') {
                window.AndroidBridge.showRewardedAd();
            }
        };

    </script>

    <script>
    (function() {
        var game = new gdjs.RuntimeGame(gdjs.projectData, {});
        window._gmGame = game;
        game.getRenderer().createStandardCanvas(document.body);
        game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);
        game.loadAllAssets(function() {
            game.startGameLoop();
            window._startAdTimers();
            /* ── Difficulty progression (speed + car count) ─────────────────
               Both speed AND the number of cars on screen scale with
               score, matching the same milestones:

               Score   0–49  → 100 px/s · max  8 cars
               Score  50–99  → 180 px/s · max  9 cars
               Score 100–149 → 340 px/s · max 10 cars
               Score 150–199 → 500 px/s · max 11 cars  ← milestone
               Score 200–249 → 660 px/s · max 12 cars
               Score 250–299 → 740 px/s · max 13 cars
               Score 300+    → 800 px/s · max 14 cars  ← hard cap
            ── */
            (function() {
                var CAR_NAMES      = ['Car1','Car2','Car3','Car4','Car5'];
                var BASE_SPEED     = 100;
                var MAX_SPEED      = 800;
                var RAMP_START     = 25;
                var STEP_SCORE     = 5;
                var SPEED_PER_STEP = 16;


                // Gentle cap: start at 8, +1 every 50 score points, hard cap 14
                function maxCarsForScore(score) {
                    return Math.min(8 + Math.floor(score / 50), 14);
                }

                setInterval(function() {
                    try {
                        var stack = game._sceneStack && game._sceneStack._stack;
                        if (!stack || !stack.length) return;
                        var scene = stack[0];

                        // Only run during active gameplay (variable index 4 = gameplay bool)
                        if (!scene.getScene().getVariables().getFromIndex(4).getAsBoolean()) return;

                        var score    = scene.getScene().getVariables().getFromIndex(2).getAsNumber();
                        var steps    = Math.max(0, Math.floor((score - RAMP_START) / STEP_SCORE));
                        var newSpeed = Math.min(BASE_SPEED + steps * SPEED_PER_STEP, MAX_SPEED);
                        var maxCars  = maxCarsForScore(score);

                        // Apply speed + collect cars for overflow trim
                        var allCars = [];
                        for (var c = 0; c < CAR_NAMES.length; c++) {
                            var cars = scene.getObjects(CAR_NAMES[c]);
                            if (!cars) continue;
                            for (var j = 0; j < cars.length; j++) {
                                try { cars[j].getBehavior('LinearMovementByAngle')._setSpeed(newSpeed); } catch(e2) {}
                                allCars.push(cars[j]);
                            }
                        }

                        // Only trim when GDevelop floods beyond the cap
                        while (allCars.length > maxCars) {
                            try { allCars.shift().deleteFromScene(scene); } catch(e3) {}
                        }

                    } catch(e) {}
                }, 200);
            })();



            /* Load saved progress */
            bridge.storage.get(['CoinsCount','Highscore','SelectedCharacter','OwningCharacters','Volume'])
                .then(function(data) {
                    try {
                        var stack = game._sceneStack && game._sceneStack._stack;
                        if (!stack || !stack.length) return;
                        var vars = stack[0].getVariables();
                        if (data[0] !== null) vars.get('CoinsCount').setNumber(parseFloat(data[0]) || 0);
                        if (data[1] !== null) vars.get('Highscore').setNumber(parseFloat(data[1]) || 0);
                        if (data[2] !== null) vars.get('SelectedCharacterName').setString(data[2]);
                        if (data[3] !== null) {
                            try {
                                var own = JSON.parse(data[3]);
                                var owningVar = vars.get('OwningCharacters');
                                if (own.Cat !== undefined) owningVar.getChild('Cat').setBool(own.Cat);
                                if (own.Dog !== undefined) owningVar.getChild('Dog').setBool(own.Dog);
                                if (own.Chicken !== undefined) owningVar.getChild('Chicken').setBool(own.Chicken);
                            } catch(pe) {}
                        }
                        if (data[4] !== null) {
                            var vol = parseFloat(data[4]) || 100;
                            vars.get('Volume').setNumber(vol);
                            try { gdjs.evtTools.sound.setGlobalVolume(stack[0], vol); } catch(ve) {}
                        }
                    } catch(e) {}
                });

            /* Auto-save every 30s and on hide */
            setInterval(function() { window._pgSaveProgress && window._pgSaveProgress(); }, 30000);

            /* Background music */
            var _bgm = new Audio("bgm.mp3");
            _bgm.loop = true; _bgm.volume = 0.5;
            window._gmBgm = _bgm; window._gmBgmStarted = false; window._gmAudioEnabled = true;
            function _startBgm() {
                if (window._gmBgmStarted) return;
                window._gmBgmStarted = true;
                document.removeEventListener("click", _startBgm);
                document.removeEventListener("touchend", _startBgm);
                if (window._gmAudioEnabled !== false) _bgm.play().catch(function() {});
            }
            document.addEventListener("click", _startBgm);
            document.addEventListener("touchend", _startBgm);

            /* Settings layer watcher */
            var _settingsWasVisible = false;
            function watchSettingsLayer() {
                try {
                    var stack = game._sceneStack && game._sceneStack._stack;
                    if (stack && stack[0]) {
                        var layer = stack[0].getLayer("Settings");
                        var isVisible = layer && layer.isVisible();
                        if (isVisible && !_settingsWasVisible) {
                            var sliders = stack[0].getObjects("SquareGreenSlider");
                            if (sliders) for (var j = 0; j < sliders.length; j++) {
                                try { sliders[j].activateBehavior("Slider", true); } catch(e) {}
                                try { sliders[j].hide(false); } catch(e) {}
                            }
                        }
                        _settingsWasVisible = !!isVisible;
                    }
                } catch(e) {}
                setTimeout(watchSettingsLayer, 100);
            }
            setTimeout(watchSettingsLayer, 1000);

            /* Hide mute button */
            function hideMuteButton() {
                try {
                    var stack = game._sceneStack && game._sceneStack._stack;
                    if (stack) for (var i = 0; i < stack.length; i++) {
                        var objs = stack[i].getObjects("MuteButton");
                        if (objs) for (var j = 0; j < objs.length; j++) {
                            objs[j].hide(true); objs[j].setPosition(-99999, -99999);
                        }
                    }
                } catch(e) {}
                setTimeout(hideMuteButton, 500);
            }
            setTimeout(hideMuteButton, 800);

        });
    })();
    </script>
